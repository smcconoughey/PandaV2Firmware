[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter
lib_deps =
lib_extra_dirs = lib

[env:dc_channel_test]
platform = teensy
board = teensy41
framework = arduino
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter
build_src_filter = -<*> +<../test/dc_channel_test/>
lib_extra_dirs = lib

[env:sensor_test]
platform = teensy
board = teensy41
framework = arduino
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter
build_src_filter = -<*> +<../test/sensor_test/>
lib_extra_dirs = lib
